name: uof
channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  - python=3.11

  # core
  - numpy
  - pandas
  - polars
  - scipy
  - pyarrow=17.0.0

  # visualization
  - matplotlib
  - seaborn
  - plotly

  # stats / ML
  - statsmodels
  - scikit-learn
  - pymc
  - bambi

  # optimization
  - optuna
  - numpyro
  - jax

  # gradient boosting
  - xgboost
  - lightgbm

  # utils
  - requests
  - xlrd
  - openpyxl
  - census

  # notebooks
  - jupyter

  # optional but useful
  - pip

  # pip-only packages (if needed)
  - pip:
      # leave empty or add packages not available on conda